name: Scrape Silversea Promos

on:
  schedule:
    - cron: '0 8 * * *'    # 5am Argentina
    - cron: '0 14 * * *'   # 11am Argentina
    - cron: '0 20 * * *'   # 5pm Argentina
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + deps
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scripts/scrape-promos.js

      - name: Commit promos JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add silversea-promos.json
          git diff --cached --quiet || git commit -m "chore: update Silversea promos [skip ci]"
          git push
